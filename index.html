<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  background: transparent;
  color: white;
  font-family: Arial;
}
.vip {
  font-size: 24px;
  margin: 5px;
}
</style>
</head>
<body>

<div id="list"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw8qvtHoQDgSyhHA0-ce-WEdltoMck9xMC5v8BuIR9NOItOPCxlYXxcd5xEXfN9nKYbNw/exec";

async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();

  const container = document.getElementById("list");
  container.innerHTML = "";

  data.forEach(user => {
    let seconds = user.durasi * 60;

    const div = document.createElement("div");
    div.className = "vip";

    function update() {
      let m = Math.floor(seconds / 60);
      let s = seconds % 60;
      div.innerText = `${user.nama} — ${m}:${s.toString().padStart(2,'0')} ⏳`;

      if (seconds > 0) seconds--;
    }

    update();
    setInterval(update, 1000);

    container.appendChild(div);
  });
}

loadData();
setInterval(loadData, 5000);
</script>

</body>
</html>
